server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: "${DATABASE_URL:jdbc:mysql://localhost:3306/appliance_product_db}"
    username: "${DATABASE_USERNAME:root}"
    password: "${DATABASE_PASSWORD:root}"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true