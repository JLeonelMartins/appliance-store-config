server:
  port: ${PRODUCT_SERVER_PORT:8081}

spring:
  datasource:
    url: "${PRODUCT_DB_URL:jdbc:mysql://localhost:3307/appliance_product_db?useSSL=false&serverTimezone=UTC}"
    username: "${PRODUCT_DB_USERNAME:root}"
    password: "${PRODUCT_DB_PASSWORD:}"

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true