server:
  port: ${NOTIFICATION_SERVER_PORT:8084}

spring:
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer

      properties:
        "[spring.json.value.default.type]": "com.martins.jonathan.appliancestore.notification.event.SaleCreatedEvent"
        "[spring.json.trusted.packages]": "com.martins.jonathan.appliancestore.notification.event"

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      show-details: always