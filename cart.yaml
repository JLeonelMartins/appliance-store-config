server:
  port: ${CART_SERVER_PORT:8082}

spring:
  datasource:
    url: "${CART_DB_URL:jdbc:mysql://localhost:3307/appliance_cart_db?useSSL=false&serverTimezone=UTC}"
    username: "${CART_DB_USERNAME:root}"
    password: "${CART_DB_PASSWORD:}"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true